<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Luanti Developer Console</title>
	<link rel="stylesheet" href="modern-normalize.min.css">
	<style>
		:root {
			/* to match modern-normalize */
			--mono-font: ui-monospace,SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;
		}
		main {
			font-family: var(--mono-font);
			font-size: 1em;
			background-color: #1e1e1e;
			color: #fff;
			margin: 2em;
			padding: 0.5em;
			min-width: 320px;
		}
		main .border {
			border: 1px solid #333;
			border-radius: 6px;
		}
		#status-bar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 0.25em 0.5em;
			font-size: 0.88em;
		}
		#status-icon {
			margin-left: 1em;
			font-variant-emoji: emoji;
		}
		#output {
			height: 420px;
			overflow-y: auto;
			padding: 0.5em;
			background-color: #000;
			white-space: pre-wrap;
			tab-size: 2;
		}
		#input {
			width: 100%;
			padding: .25em;
			background-color: #1e1e1e;
			color: #fff;
			font-family: var(--mono-font);
		}
		#input:disabled {
			border: 1px solid #a00;
		}
		#preview {
			color: #bbb;
			font-size: 0.88em;
			margin-top: 0.33em;
		}
		#preview .tabcomplete {
			text-decoration: underline;
			color: #9f9;
		}
		#output .error {
			color: #ff5555;
		}
		#output .log {
			color: #ff55ff;
		}
	</style>
</head>
<body>
	<main>
		<div id="status-bar">
			<div id="status-text"></div>
			<div id="status-icon">&nbsp;</div>
		</div>
		<div id="output" class="border"></div>
		<input id="input" class="border" type="text" placeholder="Lua code..."
			disabled autofocus autocomplete="off" />
		<div id="preview"></div>
	</main>
	<script src="/socket.io/socket.io.js"></script>
	<link rel="stylesheet" href="/highlightjs/styles/obsidian.min.css">
	<!-- NOTE: highlightjs was patched to handle the <function> syntax correctly
		 before className:"function",beginKeywords:"function",end:"\\)",
		 after className:"function",beginKeywords:"function",end:"[)>]",
	-->
	<script src="/highlightjs/highlight.min.js"></script>
	<script src="console.js"></script>
</body>
</html>
